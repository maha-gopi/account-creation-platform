spring:
  application:
    name: business-process-api
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:acct_db}
    username: ${DB_USERNAME:acct_user}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  batch:
    job:
      enabled: false  # Disable auto-start, trigger via REST
    jdbc:
      initialize-schema: always
  


# Batch job configuration
batch:
  chunk-size: 100
  skip-limit: 50
  retry-limit: 3

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      coreAccountApi:
        sliding-window-size: 100
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 10
  retry:
    instances:
      coreAccountApi:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
  ratelimiter:
    instances:
      coreAccountApi:
        limit-for-period: 1000
        limit-refresh-period: 1s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      simple:
        enabled: true

logging:
  level:
    com.bfsi.acct: INFO
    org.springframework.batch: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
